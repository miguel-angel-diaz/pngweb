  <style>
    body {
      margin: 0;
      background: #000;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .shhh-container {
      position: absolute;
      opacity: 0;
      transition: opacity 1.5s ease-in-out;
    }

    .shhh-container.visible {
      opacity: 1;
    }

    img {
      max-width: 450px;
      height: auto;
	  animation: blink 1s infinite;
    }
	  @keyframes blink {
		  0%, 100% { opacity: 1; }
		  25% { opacity: 0.3; }
		   75% { opacity: 0.7; }
	  }

  </style>
</head>
<body>

  <div class="shhh-container" id="shhh">
    <img src="./assets/images/image.png" alt="Shhh Skeleton Finger">
  </div>

  <script>
    const shhh = document.getElementById('shhh');

    function showImage() {
      shhh.classList.add('visible');
      setTimeout(() => {
        shhh.classList.remove('visible');
      }, 2000); // Visible durante 4 segundos
    }

    // Mostrar cada 30 segundos
    setInterval(showImage, 15000);

    // Mostrar al cargar por primera vez
    showImage();
  </script>

</body>
